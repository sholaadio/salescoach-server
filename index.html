  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>

  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body{background:#07080F;font-family:'DM Sans','Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent;color:#F1F5FF;min-height:100vh;}
    input,select,textarea,button{font-family:'DM Sans','Segoe UI',sans-serif;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(249,115,22,0.35);border-radius:999px;}
    body::before{content:'';position:fixed;top:-200px;left:-200px;width:700px;height:700px;background:radial-gradient(circle,rgba(249,115,22,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;}
    body::after{content:'';position:fixed;bottom:-200px;right:-200px;width:600px;height:600px;background:radial-gradient(circle,rgba(251,191,36,0.05) 0%,transparent 70%);pointer-events:none;z-index:0;}
    #root{position:relative;z-index:1;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .fade-up{animation:fadeUp 0.35s ease both;}
    @media print{nav,.no-print{display:none !important;}body{background:white !important;color:#000 !important;}}
    @media (max-width:768px){
      nav{padding:0 8px !important;overflow-x:auto;-webkit-overflow-scrolling:touch;}
      nav::-webkit-scrollbar{display:none;}
      nav button{font-size:11px !important;padding:6px 10px !important;white-space:nowrap;}
      main{padding:16px 12px !important;}
      select,input,textarea{font-size:16px !important;}
      h1{font-size:20px !important;}
    }
  </style>

// ─── COMMISSION ENGINES ───────────────────────────────────────────────────────

// Standard closer commission
function calcSalesCommission(assigned, delivered, upsells=0, repeats=0, referrals=0) {
  const a=Math.max(+assigned||0,0), d=+delivered||0;
  if (a===0) return { rate:0, perOrder:0, base:0, upsellBonus:0, repeatBonus:0, referralBonus:0, total:0, tier:"none", upsellLocked:true, followupCount:0, teamType:"sales" };
  const rate = (d/a)*100;
  let perOrder=0, tier="none";
  if (rate>=90) { perOrder=200; tier="gold"; }
  else if (rate>=65) { perOrder=150; tier="silver"; }
  else if (rate>=50) { perOrder=100; tier="bronze"; }
  const base = d*perOrder;
  const upsellLocked = rate<50;
  const upsellBonus = upsellLocked ? 0 : (+upsells||0)*600;
  const repeatBonus = (+repeats||0)*300;
  const referralBonus = (+referrals||0)*300;
  const followupCount = Math.max(0, d-a);
  return { rate:Math.round(rate), perOrder, base, upsellBonus, repeatBonus, referralBonus, total:base+upsellBonus+repeatBonus+referralBonus, tier, upsellLocked, followupCount, teamType:"sales" };
}

// Follow-Up team: callsMade → callsThrough (=assigned) → delivered. Upsell ALWAYS active.
function calcFollowupCommission(callsMade, callsThrough, delivered, upsells=0, repeats=0, referrals=0) {
  const a=Math.max(+callsThrough||0,0), d=+delivered||0;
  if (a===0) return { rate:0, perOrder:0, base:0, upsellBonus:0, repeatBonus:0, referralBonus:0, total:0, tier:"none", upsellLocked:false, callsMade:+callsMade||0, callsThrough:a, teamType:"followup" };
  const rate=(d/a)*100;
  let perOrder=0, tier="none";
  if (rate>=90) { perOrder=200; tier="gold"; }
  else if (rate>=65) { perOrder=150; tier="silver"; }
  else if (rate>=50) { perOrder=100; tier="bronze"; }
  const base=d*perOrder;
  const upsellBonus=(+upsells||0)*600; // always active — no lock
  const repeatBonus=(+repeats||0)*300;
  const referralBonus=(+referrals||0)*300;
  return { rate:Math.round(rate), perOrder, base, upsellBonus, repeatBonus, referralBonus, total:base+upsellBonus+repeatBonus+referralBonus, tier, upsellLocked:false, callsMade:+callsMade||0, callsThrough:a, teamType:"followup" };
}

// Social Media team: flat ₦200/delivered, everything split equally among members
function calcSocialCommission(leadsContacted, leadsConfirmed, delivered, upsells=0, repeats=0, referrals=0, memberCount=1) {
  const a=Math.max(+leadsConfirmed||0,0), d=+delivered||0, mc=Math.max(memberCount,1);
  const rate=a>0?Math.round((d/a)*100):0;
  const base=d*200; // flat ₦200 regardless of rate
  const upsellBonus=(+upsells||0)*600; // always active
  const repeatBonus=(+repeats||0)*300;
  const referralBonus=(+referrals||0)*300;
  const totalPool=base+upsellBonus+repeatBonus+referralBonus;
  const perMember=Math.floor(totalPool/mc);
  return { rate, base, upsellBonus, repeatBonus, referralBonus, totalPool, perMember, memberCount:mc, leadsContacted:+leadsContacted||0, leadsConfirmed:a, upsellLocked:false, tier:"flat", teamType:"socialmedia" };
}

function filterByPeriod(items, field, period) {
  const now=new Date();
  return items.filter(item=>{
    const d=new Date(item[field]);
    if(period==="day") return d.toDateString()===now.toDateString();
    if(period==="week"){ const w=new Date(now); w.setDate(now.getDate()-7); return d>=w; }
    if(period==="month") return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==="year") return d.getFullYear()===now.getFullYear();
    return true;
  });
}
function filterLogsByPeriod(logs, period) {
  const now=new Date();
  return logs.filter(l=>{
    const d=new Date(l.date);
    if(period==="day") return l.date===todayStr();
    if(period==="week"){ const w=new Date(now); w.setDate(now.getDate()-7); return d>=w; }
    if(period==="month") return l.date?.slice(0,7)===now.toISOString().slice(0,7);
    if(period==="year") return l.date?.slice(0,4)===String(now.getFullYear());
    return true;
  });
}
function getWeeklyRate(logs, closerId) {
  const wl=filterLogsByPeriod(logs.filter(l=>l.closerId===closerId&&l.status==="approved"),"week");
  const a=wl.reduce((s,l)=>s+(+(l.callsThrough||l.assigned)||0),0);
  const d=wl.reduce((s,l)=>s+(+l.delivered||0),0);
  return a>0?Math.round((d/a)*100):null;
}

const DARK_THEME  = { bg:"#07080F", card:"rgba(255,255,255,0.04)", border:"rgba(255,255,255,0.07)", text:"#F1F5FF", soft:"#C8D3E8", muted:"#6A7A90", green:"#00E5A0", yellow:"#FBBF24", red:"#FF6B6B", orange:"#F97316", navBg:"rgba(6,10,18,0.97)", surface:"rgba(255,255,255,0.03)", blue:"#60A5FA", purple:"#A78BFA", pink:"#F472B6" };
const LIGHT_THEME = { bg:"#F0F4FF", card:"rgba(255,255,255,0.9)",  border:"rgba(0,0,0,0.08)",     text:"#0A0E1A", soft:"#1E293B",   muted:"#64748B", green:"#059669", yellow:"#D97706", red:"#DC2626", orange:"#EA580C", navBg:"rgba(255,255,255,0.97)", surface:"rgba(0,0,0,0.02)",    blue:"#2563EB", purple:"#7C3AED", pink:"#DB2777" };
function getTheme() {
  try { return localStorage.getItem("sc_theme")==="light" ? LIGHT_THEME : DARK_THEME; } catch(e) { return DARK_THEME; }
}

// ─── THEME TOGGLE ────────────────────────────────────────────────────────────
function ThemeToggle() {
  const [isDark,setIsDark] = useState(()=>{ try{return localStorage.getItem("sc_theme")!=="light";}catch(e){return true;} });
  const toggle = () => {
    const next = isDark ? "light" : "dark";
    try { localStorage.setItem("sc_theme", next); } catch(e){}
    setIsDark(!isDark);
    window.location.reload();
  };
  return (
    <button onClick={toggle} title={isDark?"Switch to Light Mode":"Switch to Dark Mode"}
      style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"4px 10px",color:"#6A7A90",cursor:"pointer",fontSize:14}}>
      {isDark ? "☀️" : "🌙"}
    </button>
  );
}

// ─── TREND CHART ─────────────────────────────────────────────────────────────
function TrendChart({ reports }) {
  if (!reports || reports.length === 0) return null;
  const last30 = [...reports].sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt)).slice(-30);
  const scores = last30.map(r => r.analysis?.overallScore || 0);
  const max = Math.max(...scores, 1);
  const W = 280, H = 60;
  const pts = scores.map((s,i) => `${(i/(scores.length-1||1))*W},${H-((s/max)*H*0.85+4)}`).join(' ');
  return (
    <svg width={W} height={H} style={{overflow:"visible"}}>
      <polyline points={pts} fill="none" stroke="#F97316" strokeWidth={2} strokeLinejoin="round"/>
      {scores.map((s,i) => (
        <circle key={i} cx={(i/(scores.length-1||1))*W} cy={H-((s/max)*H*0.85+4)} r={3} fill="#F97316"/>
      ))}
    </svg>
  );
}

// ─── PWA INSTALL BANNER ──────────────────────────────────────────────────────
function PWAInstallBanner() {
  const C = getTheme();
  const [show, setShow] = useState(false);
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [isIOS, setIsIOS] = useState(false);

  useEffect(() => {
    try { if (localStorage.getItem("pwa_dismissed")) return; } catch(e){}
    const ios = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone;
    setIsIOS(ios);
    if (ios) { setShow(true); return; }
    const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); setShow(true); };
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  const install = async () => {
    if (deferredPrompt) { deferredPrompt.prompt(); const r = await deferredPrompt.userChoice; if(r.outcome==="accepted") setShow(false); }
  };
  const dismiss = () => {
    try { localStorage.setItem("pwa_dismissed","1"); } catch(e){}
    setShow(false);
  };

  if (!show) return null;
  return (
    <div style={{position:"fixed",bottom:16,left:16,right:16,zIndex:1000,background:"#1a1f2e",border:"1px solid rgba(249,115,22,0.3)",borderRadius:16,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>

        <div style={{fontSize:12,color:"#6A7A90",marginTop:2}}>
          {isIOS ? "Tap Share then 'Add to Home Screen'" : "Add to your home screen for quick access"}
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        {!isIOS && <button onClick={install} style={{background:"#F97316",border:"none",borderRadius:8,padding:"8px 14px",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer"}}>Install</button>}
        <button onClick={dismiss} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"8px 12px",color:"#6A7A90",cursor:"pointer",fontSize:13}}>✕</button>
      </div>
    </div>
  );
}

// ─── AI SUMMARY REPORT ───────────────────────────────────────────────────────
function AISummaryReport({ user, users, allReports, allLogs, teams, teamType, targetIds, scopeLabel }) {
  const C = getTheme();
  const [period, setPeriod] = useState("today");
  const [loading, setLoading] = useState(false);
  const [summary, setSummary] = useState(null);
  const [error, setError] = useState("");

  const [customFrom, setCustomFrom] = useState("");
  const [customTo, setCustomTo] = useState("");
  const periodLabel = { today:"Today's", week:"This Week's", last14:"Last 14 Days", month:"This Month's", custom:"Custom Range" };

  const getReports = () => {
    const now = new Date();
    // targetId = user.id for self, or array of ids for team/individual
    const ids = targetIds || [user.id];
    return allReports.filter(r => {
      if (!ids.includes(r.closerId)) return false;
      const d = new Date(r.createdAt);
      if (period === "today") return d.toDateString() === now.toDateString();
      if (period === "week") { const w=new Date(now); w.setDate(w.getDate()-7); return d>=w; }
      if (period === "last14") { const w=new Date(now); w.setDate(w.getDate()-14); return d>=w; }
      if (period === "month") { const m=new Date(now); m.setMonth(m.getMonth()-1); return d>=m; }
      if (period === "custom" && customFrom && customTo) {
        const from=new Date(customFrom); const to=new Date(customTo); to.setHours(23,59,59);
        return d>=from && d<=to;
      }
      return true;
    });
  };

  const generate = async () => {
    const reports = getReports();
    if (reports.length === 0) { setError("No calls found for this period"); return; }
    setLoading(true); setError(""); setSummary(null);
    try {
      const callData = reports.map((r,i) =>
        "CALL "+(i+1)+": Product="+(r.product||"?")+", Outcome="+(r.callOutcome||"?")+", Score="+(r.analysis?.overallScore||0)+"/100\n"+
        "Verdict: "+(r.analysis?.verdict||"?")+"\n"+
        "Strengths: "+((r.analysis?.strengths||[]).join("; "))+"\n"+
        "Weaknesses: "+((r.analysis?.weaknesses||[]).join("; "))
      ).join("\n\n");

      const prompt = "You are an expert Nigerian sales coach analyzing "+reports.length+" calls by "+user.name+" for "+periodLabel[period].toLowerCase()+" period.\n\n"+
        "CALL DATA:\n"+callData+"\n\n"+
        "Return ONLY valid JSON with these exact keys (no markdown):\n"+
        "headline (string), overallScore (0-100 number), grade (A+/A/B+/B/C/D/F), totalCalls (number), "+
        "topStrengths (array of 3), criticalWeaknesses (array of 3), "+
        "keyInsight (string), actionPlan (array of 3), tomorrowFocus (string), motivationalNote (string)";

      const res = await fetch(SERVER+"/analyze-summary", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ prompt, userId:user.id, period })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error||"Failed");
      setSummary(data.analysis);
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  const shareToWhatsApp = (text) => {
    if (text) window.open("https://wa.me/?text="+encodeURIComponent(text), "_blank");
  };

  const summaryText = summary ?
    "🏆 "+periodLabel[period]+" SALES PERFORMANCE SUMMARY\n"+
    "Agent: "+user.name+"\n"+
    "Score: "+summary.overallScore+"/100 ("+summary.grade+")\n"+
    "Calls: "+summary.totalCalls+"\n\n"+
    "💡 "+summary.headline+"\n\n"+
    "✅ Top Strengths:\n"+(summary.topStrengths||[]).map(s=>"• "+s).join("\n")+"\n\n"+
    "⚠️ Must Improve:\n"+(summary.criticalWeaknesses||[]).map(w=>"• "+w).join("\n")+"\n\n"+
    "🎯 Tomorrow's Focus: "+summary.tomorrowFocus+"\n\n"+
    "🔥 "+summary.motivationalNote+"\n\n"+
    "— Shoppyrex SalesCoach AI" : null;

  return (
    <div>
      <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:"20px 24px",marginBottom:16}}>
        <div style={{fontWeight:700,fontSize:14,color:"#F1F5FF",marginBottom:12}}>Select period:</div>
        {scopeLabel && <div style={{fontSize:13,fontWeight:700,color:"#F97316",marginBottom:10}}>📊 Report for: {scopeLabel}</div>}
        <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
          {Object.entries(periodLabel).map(([k,v])=>(
            <button key={k} onClick={()=>{setPeriod(k);setSummary(null);}}
              style={{background:period===k?"rgba(249,115,22,0.15)":"rgba(255,255,255,0.04)",border:"1px solid "+(period===k?"rgba(249,115,22,0.4)":"rgba(255,255,255,0.08)"),borderRadius:20,padding:"7px 18px",color:period===k?"#F97316":"#6A7A90",cursor:"pointer",fontSize:13,fontWeight:700}}>
              {v}
            </button>
          ))}
        </div>
        {period==="custom" && (
          <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
            <div><label style={{fontSize:11,color:"#6A7A90",display:"block",marginBottom:4}}>From</label><input type="date" value={customFrom} onChange={e=>{setCustomFrom(e.target.value);setSummary(null);}} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"7px 10px",color:"#F1F5FF",fontSize:13}}/></div>

// ─── CHANGE PIN MODAL ────────────────────────────────────────────────────────
function ChangePinModal({ user, onClose, saveUsersData, refresh, allUsers }) {
  const C = getTheme();
  const [oldPin, setOldPin] = useState("");
  const [newPin, setNewPin] = useState("");
  const [confirm, setConfirm] = useState("");
  const [error, setError] = useState("");
  const [saving, setSaving] = useState(false);
  const [done, setDone] = useState(false);

  const submit = async () => {
    setError("");
    if (oldPin !== user.pin) { setError("Current PIN is incorrect"); return; }
    if (newPin.length < 4) { setError("New PIN must be at least 4 digits"); return; }
    if (newPin !== confirm) { setError("PINs do not match"); return; }
    setSaving(true);
    try {
      // Always use direct API call — works in every portal
      const res = await fetch(SERVER+"/users/"+user.id, {
        method:"PUT", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({pin: newPin})
      });
      if (!res.ok) throw new Error("Server error");
      if (saveUsersData && allUsers) {
        await saveUsersData({...allUsers, [user.id]: {...user, pin: newPin}});
      }
      if (refresh) await refresh();
      setDone(true);
    } catch(e) { setError("Failed to update PIN. Check connection."); }
    setSaving(false);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#0C1320",border:"1px solid rgba(249,115,22,0.3)",borderRadius:20,padding:28,maxWidth:360,width:"100%"}}>
        {done ? (
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:40,marginBottom:12}}>✅</div>
            <div style={{fontSize:16,fontWeight:800,color:"#F1F5FF",marginBottom:8}}>PIN Updated!</div>
            <div style={{fontSize:13,color:"#6A7A90",marginBottom:20}}>Your PIN has been changed successfully.</div>
            <button onClick={onClose} style={{background:"#F97316",border:"none",borderRadius:10,padding:"10px 24px",color:"#fff",fontWeight:700,cursor:"pointer"}}>Done</button>
          </div>
        ) : (
          <>
            <div style={{fontSize:17,fontWeight:900,color:"#F1F5FF",marginBottom:4}}>🔒 Change Your PIN</div>
            <div style={{fontSize:12,color:"#6A7A90",marginBottom:20}}>Keep your account secure</div>
            {[
              {label:"Current PIN", val:oldPin, set:setOldPin},
              {label:"New PIN", val:newPin, set:setNewPin},
              {label:"Confirm New PIN", val:confirm, set:setConfirm},
            ].map(({label,val,set})=>(
              <div key={label} style={{marginBottom:14}}>
                <div style={{fontSize:12,fontWeight:700,color:"#6A7A90",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.07em"}}>{label}</div>

                  style={{width:"100%",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"11px 14px",color:"#F1F5FF",fontSize:18,letterSpacing:"0.3em",outline:"none",boxSizing:"border-box"}}/>
              </div>
            ))}
            {error && <div style={{color:"#FF6B6B",fontSize:12,marginBottom:12}}>⚠️ {error}</div>}
            <div style={{display:"flex",gap:10,marginTop:4}}>
              <button onClick={onClose} style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"11px",color:"#6A7A90",cursor:"pointer",fontSize:14}}>Cancel</button>
              <button onClick={submit} disabled={saving} style={{flex:2,background:"linear-gradient(135deg,#F97316,#EA580C)",border:"none",borderRadius:10,padding:"11px",color:"#fff",fontWeight:800,fontSize:14,cursor:"pointer",opacity:saving?0.7:1}}>
                {saving ? "Updating..." : "Update PIN"}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── PERFORMANCE WARNING ──────────────────────────────────────────────────────
function PerformanceWarning({ logs, userId }) {
  const rate=getWeeklyRate(logs, userId);
  if(rate===null||rate>=60||new Date().getDay()<3) return null;
  return (
    <div style={{ background:"rgba(255,107,107,0.08)",border:"1px solid rgba(255,107,107,0.35)",borderRadius:14,padding:"14px 18px",marginBottom:18,display:"flex",gap:12,alignItems:"flex-start" }}>
      <div style={{ fontSize:22 }}>🚨</div>
      <div>
        <div style={{ fontSize:13,fontWeight:800,color:C.red,marginBottom:3 }}>Performance Red Flag — This Week</div>
        <div style={{ fontSize:12,color:"#FF9999",lineHeight:1.65 }}>Your delivery rate this week is <strong>{rate}%</strong> — below the 60% minimum. Please speak with your team lead and focus on improving your follow-up and confirmation rate before the week ends.</div>
      </div>
    </div>
  );
}

// ─── SCORE RING ───────────────────────────────────────────────────────────────
function ScoreRing({ score, size=100, stroke=9 }) {
  const r=(size-stroke*2)/2, circ=2*Math.PI*r, color=scoreColor(score);
  return (
    <div style={{ position:"relative",width:size,height:size,flexShrink:0 }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)",position:"absolute" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={circ*(1-score/100)} strokeLinecap="round" style={{ transition:"stroke-dashoffset 1.2s ease" }}/>
      </svg>
      <div style={{ position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center" }}>
        <span style={{ fontSize:size*0.25,fontWeight:900,color:C.text,lineHeight:1 }}>{score}</span>
        <span style={{ fontSize:size*0.11,color:C.muted,marginTop:2 }}>/100</span>
      </div>
    </div>
  );
}

            {l:"Upsell (₦600)",    v:comm.upsellLocked?"🔒 Locked":fmtNaira(comm.upsellBonus),   c:comm.upsellLocked?C.muted:C.green},

// ─── CALL UPLOAD ────────────────────────────────────────────────────────────────────────────────
function CallUploadSection({ user, teams, refresh }) {
  const [callType,setCallType]=useState("phone");
  const [callOutcome,setCallOutcome]=useState("unknown");
  const [success,setSuccess]=useState(false);
  const [product,setProduct]=useState("");
  const [audioFile,setAudioFile]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [status,setStatus]=useState("");
  const [progress,setProgress]=useState(0);
  const fileRef=useRef();
  const teamType=teams[user.teamId]?.type||"sales";

  const fileSizeMB = audioFile ? (audioFile.size/1024/1024).toFixed(1) : null;
  const fileOk = audioFile && audioFile.size < 25*1024*1024;

  const handleFile = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > 25*1024*1024) { setError(`File too large (${(f.size/1024/1024).toFixed(1)}MB). Max is 25MB. Please compress or trim the recording.`); return; }
    setAudioFile(f); setError("");
  };

  const submit = async () => {
    if (!audioFile) { setError("Please select an audio file."); return; }
    setError(""); setLoading(true); setProgress(5);
    try {
      setStatus("🎙️ Transcribing audio with Whisper AI..."); setProgress(10);
      const transcript = await transcribeAudio(audioFile);
      setProgress(45); setStatus("✅ Transcription done! Analyzing with Claude...");
      const steps=["🔍 Detecting language...","📊 Scoring performance...","✍️ Writing coaching report...","📚 Finding learning resources..."];
      let si=0; const sv=setInterval(()=>{ si=Math.min(si+1,steps.length-1); setStatus(steps[si]); setProgress(p=>Math.min(p+10,90)); },2200);
      const analysis = await analyzeWithClaude({transcript,closerName:user.name,callType,callOutcome,product,teamType});
      clearInterval(sv); setProgress(95);
      await addReport({ id:uid(), closerId:user.id, closerName:user.name, teamId:user.teamId, teamType, date:Date.now(), callType, callOutcome, product, audioFileName:audioFile.name, transcript, analysis });
      await refresh();
      setLoading(false); setProgress(0); setStatus("");
      setAudioFile(null); setProduct(""); setCallOutcome("unknown");
      if (fileRef.current) fileRef.current.value = "";
      setSuccess(true); setTimeout(()=>setSuccess(false), 5000);
    } catch(e) {
      setLoading(false); setProgress(0); setStatus("");
      setError(e.message || "Something went wrong. Try again.");
    }
  };

  if (loading) return (
    <div style={{ ...S.card,textAlign:"center",padding:"44px 24px" }}>
      <style>{`@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}} @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}`}</style>
      <div style={{ fontSize:44,display:"inline-block",animation:"spin 2.5s linear infinite",marginBottom:16 }}>{progress<45?"🎙️":"🤖"}</div>
      <div style={{ fontSize:15,fontWeight:800,color:C.text,marginBottom:6 }}>{status}</div>
      <div style={{ fontSize:12,color:C.muted,marginBottom:20 }}>{progress<45?"Whisper is converting your audio to text...":"Claude is reading the transcript and building your report..."}</div>
      <div style={{ maxWidth:320,margin:"0 auto" }}>
        <div style={{ height:6,background:"rgba(255,255,255,0.06)",borderRadius:999,overflow:"hidden" }}>
          <div style={{ width:`${progress}%`,height:"100%",background:`linear-gradient(90deg,${C.green},#EA580C)`,borderRadius:999,transition:"width 0.6s ease" }}/>
        </div>
        <div style={{ display:"flex",justifyContent:"space-between",marginTop:8,fontSize:10,color:C.muted }}>
          <span style={{ color:progress>=10?C.green:C.muted }}>🎙️ Transcribe</span>
          <span style={{ color:progress>=45?C.green:C.muted }}>🤖 Analyze</span>
          <span style={{ color:progress>=90?C.green:C.muted }}>📊 Report</span>
        </div>
      </div>
      <div style={{ marginTop:16,fontSize:11,color:C.muted,animation:"pulse 2s ease infinite" }}>This takes 30–90 seconds for a 5–15 min call</div>
    </div>
  );

  return (
    <div style={S.card}>
      {success&&<div style={{ background:"rgba(0,229,160,0.1)",border:"1px solid rgba(0,229,160,0.25)",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,color:"#00E5A0",lineHeight:1.6,display:"flex",alignItems:"center",gap:10 }}>
        <span style={{fontSize:20}}>🎉</span>
        <div><strong>Call analyzed successfully!</strong><br/><span style={{fontSize:12,opacity:0.8}}>Your report has been saved. Check History to view it.</span></div>
      </div>}
      {error&&<div style={{ background:"rgba(255,107,107,0.08)",border:"1px solid rgba(255,107,107,0.2)",borderRadius:10,padding:"10px 13px",marginBottom:14,fontSize:12,color:"#FF8080",lineHeight:1.6 }}>⚠️ {error}</div>}
      <div style={{ ...S.g2,marginBottom:14 }}>
        <div><label style={S.label}>Call Type</label>
          <select style={S.select} value={callType} onChange={e=>setCallType(e.target.value)}>
            <option value="phone">📞 Phone Call</option>
            <option value="whatsapp">💬 WhatsApp Call</option>
          </select>
        </div>
        <div><label style={S.label}>Product Pitched</label>
          <input style={S.input} placeholder="e.g. Weight Loss Bundle" value={product} onChange={e=>setProduct(e.target.value)}/>
        </div>

      <div onClick={()=>fileRef.current?.click()} style={{ border:`2px dashed ${audioFile?C.green:"rgba(255,255,255,0.12)"}`,borderRadius:14,padding:"28px 20px",textAlign:"center",cursor:"pointer",background:audioFile?"rgba(0,229,160,0.04)":"rgba(255,255,255,0.02)",transition:"all 0.2s",marginBottom:14 }}>
        <input ref={fileRef} type="file" accept="audio/*,.mp3,.m4a,.wav,.ogg,.aac,.mp4" style={{ display:"none" }} onChange={handleFile}/>

function EditNameInline({uid,currentName,users,saveUsersData,refresh,flash}){
  const [editing,setEditing]=useState(false);
  const [val,setVal]=useState(currentName);
  const [saving,setSaving]=useState(false);
  const save=async()=>{ if(!val.trim()) return; setSaving(true); const u={...users,[uid]:{...users[uid],name:val.trim()}}; await saveUsersData(u); await refresh(); setSaving(false); setEditing(false); flash("Name updated!"); };
  if(!editing) return <button onClick={()=>{setVal(currentName);setEditing(true);}} style={{...S.btnGhost,padding:"6px 12px",fontSize:13}}>Edit</button>;
  return <div style={{display:"flex",gap:6}}><input style={{...S.input,padding:"7px 10px",fontSize:13,width:160}} value={val} onChange={e=>setVal(e.target.value)} autoFocus onKeyDown={e=>{if(e.key==="Enter")save();if(e.key==="Escape")setEditing(false);}}/><button onClick={save} style={{...S.btn,padding:"7px 12px",fontSize:13}}>{saving?"...":"Save"}</button><button onClick={()=>setEditing(false)} style={{...S.btnGhost,padding:"7px 10px",fontSize:13}}>✕</button></div>;
}

function ManagementDashboard({ user, users, teams, allReports, allLogs, allNoAnswers, onLogout, refresh, saveUsersData }) {
  const perms = getPerms(user);
  const [summaryTarget, setSummaryTarget] = useState("");
  const [showChangePin, setShowChangePin] = useState(false);
  const [resetPinTarget, setResetPinTarget] = useState(null);
  const [resetPinVal, setResetPinVal] = useState("");
  const [resetMsg, setResetMsg] = useState("");
  const [tab,setTab]=useState("overview"); const [period,setPeriod]=useState("month");
  const [viewReport,setViewReport]=useState(null); const [msg,setMsg]=useState("");
  const [newName,setNewName]=useState(""); const [newPin,setNewPin]=useState(""); const [newRole,setNewRole]=useState("closer"); const [newTeam,setNewTeam]=useState("team1"); const [showAdd,setShowAdd]=useState(false); const [saving,setSaving]=useState(false);
  const flash=m=>{setMsg(m);setTimeout(()=>setMsg(""),3000);};
  const accentColor=accent(user.role); const teamList=Object.values(teams); const thisMonth=new Date().toISOString().slice(0,7);
  const closerList=Object.values(users).filter(u=>["closer","teamlead"].includes(u.role));
  const allStats=closerList.map(c=>{
    const reports=allReports.filter(r=>r.closerId===c.id);
    const logs=allLogs.filter(l=>l.closerId===c.id);
    const filtLogs=filterLogsByPeriod(logs.filter(l=>l.status==="approved"),period);
    const pAssigned=filtLogs.reduce((s,l)=>s+(+(l.callsThrough||l.leadsConfirmed||l.assigned)||0),0);
    const pDelivered=filtLogs.reduce((s,l)=>s+(+l.delivered||0),0);
    const periodRate=pAssigned>0?Math.round((pDelivered/pAssigned)*100):0;
    const avgScore=reports.length>0?Math.round(reports.reduce((s,r)=>s+(r.analysis?.overallScore||0),0)/reports.length):0;
    const weekRate=getWeeklyRate(allLogs,c.id);
    const team=teams[c.teamId]; const teamType=team?.type||"sales";
    // Earnings calculation differs for social media
    let periodEarnings=0;
    if(teamType==="socialmedia"){ periodEarnings=filtLogs.reduce((s,l)=>s+(l.commission?.perMember||0),0); }
    else { periodEarnings=filtLogs.reduce((s,l)=>s+(l.commission?.total||0),0); }
    return { ...c, reports, logs, avgScore, periodRate, periodEarnings, weekRate, team, teamType };
  }).sort((a,b)=>b.avgScore-a.avgScore);

  const poolQualifiers=allStats.filter(c=>c.teamType!=="socialmedia"&&(()=>{ const ml=c.logs.filter(l=>l.date?.startsWith(thisMonth)&&l.status==="approved"); const ma=ml.reduce((s,l)=>s+(+(l.callsThrough||l.assigned)||0),0); const md=ml.reduce((s,l)=>s+(+l.delivered||0),0); return ma>0&&(md/ma)>=0.9; })());
  const totalCommission=allLogs.filter(l=>l.status==="approved").reduce((s,l)=>s+(l.commission?.total||l.commission?.perMember||0),0);
  const filteredReports=filterByPeriod(allReports,"date",period);
  const redFlags=allStats.filter(c=>c.weekRate!==null&&c.weekRate<60);
  const teamStats=teamList.map(t=>{
    const members=Object.values(users).filter(u=>u.teamId===t.id);
    const tReports=filterByPeriod(allReports.filter(r=>r.teamId===t.id),"date",period);
    const tLogs=filterLogsByPeriod(allLogs.filter(l=>l.teamId===t.id&&l.status==="approved"),period);
    const avgScore=tReports.length>0?Math.round(tReports.reduce((s,r)=>s+(r.analysis?.overallScore||0),0)/tReports.length):0;
    const tEarnings=t.type==="socialmedia"?tLogs.reduce((s,l)=>s+(l.commission?.totalPool||0),0):tLogs.reduce((s,l)=>s+(l.commission?.total||0),0);
    return { ...t, members, tReports, tEarnings, avgScore };
  });
  const exportCSV=()=>{ const rows=[["Date","Closer","Team","Product","Type","Outcome","Score"]]; filteredReports.forEach(r=>{ const t=teams[r.teamId]; rows.push([fmtDate(r.date),r.closerName,t?.name||"",r.product||"",r.callType,r.callOutcome,r.analysis?.overallScore||""]); }); const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n"); const a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv); a.download="calls.csv"; a.click(); };

// ─── PIN RESET PANEL ─────────────────────────────────────────────────────────
function PinResetPanel({ user, users, saveUsersData, refresh, flash }) {
  const [sel, setSel] = React.useState(null);
  const [newPin, setNewPin] = React.useState("");
  const [saving, setSaving] = React.useState(false);

  // Who can this user reset pins for?
  const canResetFor = (target) => {
    if (!target || target.id === user.id) return false;
    if (user.role === "ceo") return true;
    if (user.role === "gm") return target.role !== "ceo";
    if (user.role === "head_sales") return ["teamlead","closer"].includes(target.role);
    return false;
  };

  const resetable = Object.values(users).filter(u => canResetFor(u)).sort((a,b) => {
    const o = {gm:0,head_sales:1,head_creative:2,hr:3,teamlead:4,closer:5};
    return (o[a.role]||9)-(o[b.role]||9);
  });

  const doReset = async () => {
    if (!sel || newPin.length !== 4) { flash("⚠️ Select a person and enter a 4-digit PIN"); return; }
    setSaving(true);
    try {
      const res = await fetch(SERVER+"/users/"+sel, {
        method:"PUT", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({pin: newPin})
      });
      if (!res.ok) throw new Error("Failed");
      await saveUsersData({...users, [sel]: {...users[sel], pin: newPin}});
      await refresh();
      flash("✅ PIN reset for " + users[sel]?.name);
      setSel(null); setNewPin("");
    } catch(e) { flash("❌ Failed to reset PIN"); }
    setSaving(false);
  };

  return (
    <div style={{...S.card, marginBottom:20}}>
      <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:4}}>🔑 Reset Staff PIN</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:16}}>
        {user.role==="ceo" ? "You can reset anyone's PIN" : user.role==="gm" ? "You can reset all staff PINs except CEO" : "You can reset Team Lead and Closer PINs"}
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
        {resetable.map(u => {
          const a = accent(u.role);
          return (
            <button key={u.id} onClick={() => {setSel(u.id); setNewPin("");}}
              style={{background:sel===u.id?`${a}20`:"rgba(255,255,255,0.04)",border:"1px solid "+(sel===u.id?a:"rgba(255,255,255,0.08)"),borderRadius:10,padding:"8px 14px",color:sel===u.id?a:C.soft,cursor:"pointer",fontSize:12,fontWeight:600}}>
              {u.name} <span style={{fontSize:10,color:C.muted}}>({ROLE_LABELS[u.role]})</span>
            </button>
          );
        })}
      </div>
      {sel && users[sel] && (
        <div style={{display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:200}}>
            <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.07em"}}>New 4-Digit PIN for {users[sel]?.name}</div>
            <input type="password" inputMode="numeric" maxLength={4} value={newPin}
              onChange={e=>setNewPin(e.target.value.replace(/\D/g,"").slice(0,4))}
              placeholder="Enter new PIN"
              style={{...S.input,letterSpacing:"0.3em",fontSize:18,maxWidth:180}}/>
          </div>
          <button onClick={doReset} disabled={saving||newPin.length!==4}
            style={{...S.btn,opacity:saving||newPin.length!==4?0.5:1,minWidth:120}}>
            {saving?"Resetting...":"🔑 Reset PIN"}
          </button>
        </div>
      )}
      {resetable.length===0&&<div style={{color:C.muted,fontSize:13}}>No staff PINs available to reset with your permission level.</div>}
    </div>
  );
}

  closer:       { viewReports:true,  viewCommission:true,  approveLogs:false, manageUsers:false, generateSummary:true, viewLeaderboard:true, uploadCalls:true,  logSales:true,  viewAllTeams:false, resetPins:false, manageRoles:false },
};
const PERMISSION_LABELS = {
  viewReports:"View all reports", viewCommission:"View commission data", approveLogs:"Approve logs",
  manageUsers:"Manage users", generateSummary:"AI summary reports", viewLeaderboard:"View leaderboard",
  uploadCalls:"Upload calls", logSales:"Log daily sales", viewAllTeams:"View all teams",
  resetPins:"Reset PINs", manageRoles:"Manage roles",
};
function getPerms(user) {
  const defaults = DEFAULT_PERMISSIONS[user.role] || DEFAULT_PERMISSIONS.closer;
  return user.customPerms ? {...defaults, ...user.customPerms} : defaults;
}

// ─── PERMISSIONS PANEL (CEO only) ───────────────────────────────
function PermissionsPanel({ users, saveUsersData, refresh, flash }) {
  const [sel, setSel] = React.useState(null);
  const [saving, setSaving] = React.useState(false);
  const selUser = sel ? users[sel] : null;
  const perms = selUser ? getPerms(selUser) : null;

  const toggle = async (key) => {
    if (!selUser) return;
    setSaving(true);
    const cur = getPerms(selUser);
    const newCustom = {...(selUser.customPerms||{}), [key]: !cur[key]};
    await saveUsersData({...users, [sel]: {...selUser, customPerms: newCustom}});
    await refresh();
    setSaving(false);
    flash("Permission updated");
  };

  const resetDef = async () => {
    if (!selUser) return;
    setSaving(true);
    const u2 = {...selUser};
    delete u2.customPerms;
    await saveUsersData({...users, [sel]: u2});
    await refresh();
    setSaving(false);
    flash("Reset to defaults");
  };

  const others = Object.values(users).sort((a,b) => {
    const o = {ceo:0,gm:1,head_sales:2,head_creative:3,hr:4,teamlead:5,closer:6};
    return (o[a.role]||9)-(o[b.role]||9) || a.name.localeCompare(b.name);
  });
  return (
    <div>
      <h1 style={{fontSize:20,fontWeight:900,marginBottom:4,marginTop:20}}>🛡️ Permission Settings</h1>
      <p style={{fontSize:13,color:C.muted,marginBottom:20}}>Customise what each person can access.</p>
      <div style={{...S.card,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>Select staff:</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {others.map(u => (
            <button key={u.id} onClick={() => setSel(u.id)}
              style={{background:sel===u.id?"rgba(249,115,22,0.2)":"rgba(255,255,255,0.05)",border:"1px solid "+(sel===u.id?"rgba(249,115,22,0.5)":"rgba(255,255,255,0.1)"),borderRadius:8,padding:"7px 14px",color:sel===u.id?C.orange:C.soft,cursor:"pointer",fontSize:12,fontWeight:600}}>
              {u.name}
            </button>
          ))}
        </div>
      </div>
      {selUser && perms && (
        <div style={{...S.card}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
            <div>
              <div style={{fontSize:15,fontWeight:800,color:C.text}}>{selUser.name}</div>
              <div style={{fontSize:12,color:C.muted}}>{selUser.customPerms ? "Custom permissions" : "Default permissions"}</div>
            </div>
            {selUser.customPerms && (
              <button onClick={resetDef} style={{background:"rgba(255,107,107,0.1)",border:"1px solid rgba(255,107,107,0.25)",borderRadius:8,padding:"6px 12px",color:"#FF6B6B",cursor:"pointer",fontSize:12}}>
                Reset to defaults
              </button>
            )}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {Object.entries(PERMISSION_LABELS).map(([key, label]) => {
              const on = perms[key];
              const changed = selUser.customPerms && key in selUser.customPerms;
              return (
                <div key={key} onClick={() => toggle(key)}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:on?"rgba(0,229,160,0.05)":"rgba(255,255,255,0.02)",border:"1px solid "+(on?"rgba(0,229,160,0.2)":"rgba(255,255,255,0.07)"),borderRadius:10,cursor:"pointer"}}>
                  <div style={{width:36,height:20,borderRadius:10,background:on?"#00E5A0":"rgba(255,255,255,0.1)",position:"relative",flexShrink:0}}>
                    <div style={{position:"absolute",top:2,left:on?18:2,width:16,height:16,borderRadius:8,background:"#fff",transition:"left 0.2s"}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11,fontWeight:700,color:on?C.text:C.muted}}>{label}</div>
                    {changed && <div style={{fontSize:9,color:C.orange,marginTop:1}}>Custom</div>}
                  </div>
                </div>
              );
            })}
          </div>
          {saving && <div style={{textAlign:"center",color:C.orange,fontSize:12,marginTop:10}}>Saving...</div>}
        </div>
      )}
    </div>
  );
}

// ─── TEAM LEADERBOARD ────────────────────────────────────────────
function TeamLeaderboard({ users, teams, allReports, allLogs, period, myTeamId, showAllIndividuals, closerView, teamLeadView, managementView }) {
  const [view, setView] = React.useState(closerView ? "teams" : "teams");
  const closers = Object.values(users).filter(u => ["closer","teamlead"].includes(u.role));
  const teamList = Object.values(teams);

  const teamStats = teamList.map(t => {
    const members = closers.filter(c => c.teamId === t.id);
    const logs = filterLogsByPeriod(allLogs.filter(l => l.teamId === t.id && l.status === "approved"), period);
    const assigned = logs.reduce((s,l) => s+(+(l.callsThrough||l.assigned)||0), 0);
    const delivered = logs.reduce((s,l) => s+(+l.delivered||0), 0);
    const rate = assigned > 0 ? Math.round((delivered/assigned)*100) : 0;
    const rpts = allReports.filter(r => members.some(m => m.id === r.closerId));
    const avgScore = rpts.length > 0 ? Math.round(rpts.reduce((s,r) => s+(r.analysis?.overallScore||0),0)/rpts.length) : 0;
    return {...t, rate, avgScore, delivered, assigned, memberCount:members.length};
  }).sort((a,b) => b.rate-a.rate || b.avgScore-a.avgScore);

  const eligible = (showAllIndividuals || managementView) ? closers : closers.filter(c => c.teamId === myTeamId);
  const indStats = eligible.map(c => {
    const logs = filterLogsByPeriod(allLogs.filter(l => l.closerId === c.id && l.status === "approved"), period);
    const assigned = logs.reduce((s,l) => s+(+(l.callsThrough||l.assigned)||0), 0);
    const delivered = logs.reduce((s,l) => s+(+l.delivered||0), 0);
    const rate = assigned > 0 ? Math.round((delivered/assigned)*100) : 0;
    const rpts = allReports.filter(r => r.closerId === c.id);
    const avgScore = rpts.length > 0 ? Math.round(rpts.reduce((s,r) => s+(r.analysis?.overallScore||0),0)/rpts.length) : 0;
    return {...c, rate, avgScore, delivered, assigned, team:teams[c.teamId]};
  }).filter(c => c.assigned > 0 || allReports.some(r => r.closerId === c.id)).sort((a,b) => b.rate-a.rate||b.avgScore-a.avgScore);

  const MEDALS = ["🥇","🥈","🥉"];
  const rankGrad = [
    "linear-gradient(135deg,rgba(255,215,0,0.07),rgba(255,215,0,0.02))",
    "linear-gradient(135deg,rgba(192,192,192,0.05),rgba(192,192,192,0.01))",
    "linear-gradient(135deg,rgba(205,127,50,0.05),rgba(205,127,50,0.01))",
  ];
  const rankBorder = ["rgba(255,215,0,0.3)","rgba(192,192,192,0.2)","rgba(205,127,50,0.2)"];
  const rankTop = [
    "linear-gradient(90deg,#FFD700,#FFA500)",
    "linear-gradient(90deg,#C0C0C0,#A0A0A0)",
    "linear-gradient(90deg,#CD7F32,#A0522D)",
  ];

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        <button onClick={()=>setView("teams")}
          style={{background:view==="teams"?"rgba(249,115,22,0.15)":"rgba(255,255,255,0.04)",border:"1px solid "+(view==="teams"?"rgba(249,115,22,0.4)":"rgba(255,255,255,0.08)"),borderRadius:20,padding:"8px 22px",color:view==="teams"?C.orange:C.muted,cursor:"pointer",fontSize:13,fontWeight:700}}>
          🏢 Team Rankings
        </button>
        {!closerView&&(
          <button onClick={()=>setView("individuals")}
            style={{background:view==="individuals"?"rgba(249,115,22,0.15)":"rgba(255,255,255,0.04)",border:"1px solid "+(view==="individuals"?"rgba(249,115,22,0.4)":"rgba(255,255,255,0.08)"),borderRadius:20,padding:"8px 22px",color:view==="individuals"?C.orange:C.muted,cursor:"pointer",fontSize:13,fontWeight:700}}>
            👤 {managementView ? "Company-wide" : "My Team"}
          </button>
        )}
      </div>

      {view === "teams" && (
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {teamStats.map((t,i) => (
            <div key={t.id} style={{background:i<3?rankGrad[i]:S.card.background,border:"1px solid "+(i<3?rankBorder[i]:myTeamId===t.id?"rgba(249,115,22,0.35)":S.card.border),borderRadius:16,padding:"18px 22px",position:"relative",overflow:"hidden"}}>
              {i<3&&<div style={{position:"absolute",top:0,left:0,right:0,height:3,background:rankTop[i]}}/>}
              <div style={{display:"flex",alignItems:"center",gap:14}}>
                <div style={{fontSize:i<3?30:18,width:40,textAlign:"center",lineHeight:1,flexShrink:0}}>
                  {i<3?MEDALS[i]:<span style={{fontSize:12,fontWeight:900,color:C.muted}}>#{i+1}</span>}
                </div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{fontWeight:800,fontSize:16,color:C.text}}>{t.name}</span>
                    {myTeamId===t.id&&<span style={{fontSize:10,fontWeight:800,background:"rgba(249,115,22,0.2)",color:"#F97316",padding:"2px 8px",borderRadius:20}}>YOUR TEAM</span>}
                  </div>
                  <div style={{fontSize:12,color:C.muted,marginTop:3}}>{t.memberCount} members · {t.delivered}/{t.assigned} delivered</div>
                </div>
                <div style={{display:"flex",gap:18,alignItems:"center"}}>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:26,fontWeight:900,color:t.rate>=70?C.green:t.rate>=50?C.yellow:C.red,lineHeight:1}}>{t.rate}%</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>conversion</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:20,fontWeight:800,color:C.blue,lineHeight:1}}>{t.avgScore||"—"}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>avg score</div>
                  </div>
                </div>
              </div>
            </div>
          ))}
          {teamStats.length === 0 && <div style={{color:C.muted,textAlign:"center",padding:48,fontSize:14}}>No data yet for this period</div>}
        </div>
      )}

      {view === "individuals" && (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {indStats.map((c,i) => (
            <div key={c.id} style={{background:i<3?rankGrad[i]:S.card.background,border:"1px solid "+(i<3?rankBorder[i]:S.card.border),borderRadius:14,padding:"14px 18px",position:"relative",overflow:"hidden"}}>
              {i<3&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:rankTop[i]}}/>}
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{fontSize:i<3?24:16,width:34,textAlign:"center",lineHeight:1}}>{i<3?MEDALS[i]:"#"+(i+1)}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,color:C.text}}>{c.name}</div>
                  {(showAllIndividuals || managementView) && c.team && (
                    <div style={{fontSize:11,color:C.orange,opacity:0.7,marginTop:2}}>📍 {c.team.name}</div>
                  )}
                  <div style={{fontSize:11,color:C.muted,marginTop:1}}>{c.delivered}/{c.assigned} delivered</div>
                </div>
                <div style={{display:"flex",gap:12,alignItems:"center"}}>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:20,fontWeight:900,color:c.rate>=70?C.green:c.rate>=50?C.yellow:C.red,lineHeight:1}}>{c.rate}%</div>
                    <div style={{fontSize:10,color:C.muted}}>conversion</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:800,color:C.blue,lineHeight:1}}>{c.avgScore||"—"}</div>
                    <div style={{fontSize:10,color:C.muted}}>score</div>
                  </div>
                </div>
              </div>
            </div>
          ))}
          {indStats.length === 0 && <div style={{color:C.muted,textAlign:"center",padding:48,fontSize:14}}>No data yet for this period</div>}
        </div>
      )}
    </div>
  );
}


function App() {
  const [ready,setReady]=useState(false);
  const [error,setError]=useState("");
  const [users,setUsers]=useState(SEED_USERS);
  const [teams,setTeams]=useState(SEED_TEAMS);
  const [reports,setReports]=useState([]);
  const [logs,setLogs]=useState([]);
  const [noAnswers,setNoAnswers]=useState([]);
  const [currentUser,setCurrentUser]=useState(null);

  const refresh=async()=>{
    try {
      const [u,t,r,l,n]=await Promise.all([getUsers(),getTeams(),getReports(),getDailyLogs(),getNoAnswers()]);
      console.log("REFRESH users:",u?Object.keys(u).length:0,"logs:",Array.isArray(l)?l.length:l,"teams:",t?Object.keys(t).length:0);
      if(l&&l.length>0) console.log("FIRST LOG:",JSON.stringify(l[0]));
      if(u&&Object.keys(u).length>0) setUsers(u);
      if(t&&Object.keys(t).length>0) setTeams(t);
      setReports(Array.isArray(r)?r:[]);
      setLogs(Array.isArray(l)?l:[]);
      setNoAnswers(Array.isArray(n)?n:[]);
    } catch(e) { console.error("refresh error:",e); }
  };

  useEffect(()=>{
    (async()=>{
      try {
        await seedIfEmpty();
        await refresh();
      } catch(e) { console.error("init error:",e); }
      setReady(true);
    })();
  },[]);

  if(!ready) return (
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse 80% 60% at 50% 0%,rgba(249,115,22,0.12),transparent 60%),#07080F",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}>
        <img src={LOGO_SRC} style={{width:80,height:80,objectFit:"contain",marginBottom:20,borderRadius:16}}/>
        <div style={{fontFamily:"Syne,sans-serif",fontSize:22,fontWeight:800,color:"#F1F5FF",marginBottom:8}}>Shoppyrex SalesCoach</div>
        <div style={{color:"#64748B",fontSize:14,marginBottom:24}}>Connecting to server...</div>
        <div style={{width:44,height:44,border:"3px solid rgba(249,115,22,0.2)",borderTop:"3px solid #F97316",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto"}}/>
      </div>
    </div>
  );

  if(!currentUser) return <PinPad users={users} onSuccess={async u=>{
    setReady(false);
    setCurrentUser(u);
    await refresh();
    setReady(true);
  }}/>;

  const props={ user:currentUser, users, teams, allReports:reports, allLogs:logs, allNoAnswers:noAnswers, onLogout:()=>setCurrentUser(null), refresh };
  const role=currentUser.role;
  if(role==="closer") return <CloserPortal {...props}/>;
  if(role==="teamlead") return <TeamLeadPortal {...props}/>;
  return <ManagementDashboard {...props} saveUsersData={async u=>{await saveUsers(u);setUsers(u);}}/>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
</body>
