// ─── COMMISSION ENGINES ───────────────────────────────────────────────────────

// Standard closer commission
function calcSalesCommission(assigned, delivered, upsells=0, repeats=0, referrals=0) {
  const a=Math.max(+assigned||0,0), d=+delivered||0;
  if (a===0) return { rate:0, perOrder:0, base:0, upsellBonus:0, repeatBonus:0, referralBonus:0, total:0, tier:"none", upsellLocked:true, followupCount:0, teamType:"sales" };
  const rate = (d/a)*100;
  let perOrder=0, tier="none";
  if (rate>=90) { perOrder=200; tier="gold"; }
  else if (rate>=65) { perOrder=150; tier="silver"; }
  else if (rate>=50) { perOrder=100; tier="bronze"; }
  const base = d*perOrder;
  const upsellLocked = rate<50;
  const upsellBonus = upsellLocked ? 0 : (+upsells||0)*600;
  const repeatBonus = (+repeats||0)*300;
  const referralBonus = (+referrals||0)*300;
  const followupCount = Math.max(0, d-a);
  return { rate:Math.round(rate), perOrder, base, upsellBonus, repeatBonus, referralBonus, total:base+upsellBonus+repeatBonus+referralBonus, tier, upsellLocked, followupCount, teamType:"sales" };
}

// Follow-Up team: callsMade → callsThrough (=assigned) → delivered. Upsell ALWAYS active.
function calcFollowupCommission(callsMade, callsThrough, delivered, upsells=0, repeats=0, referrals=0) {
  const a=Math.max(+callsThrough||0,0), d=+delivered||0;
  if (a===0) return { rate:0, perOrder:0, base:0, upsellBonus:0, repeatBonus:0, referralBonus:0, total:0, tier:"none", upsellLocked:false, callsMade:+callsMade||0, callsThrough:a, teamType:"followup" };
  const rate=(d/a)*100;
  let perOrder=0, tier="none";
  if (rate>=90) { perOrder=200; tier="gold"; }
  else if (rate>=65) { perOrder=150; tier="silver"; }
  else if (rate>=50) { perOrder=100; tier="bronze"; }
  const base=d*perOrder;
  const upsellBonus=(+upsells||0)*600; // always active — no lock
  const repeatBonus=(+repeats||0)*300;
  const referralBonus=(+referrals||0)*300;
  return { rate:Math.round(rate), perOrder, base, upsellBonus, repeatBonus, referralBonus, total:base+upsellBonus+repeatBonus+referralBonus, tier, upsellLocked:false, callsMade:+callsMade||0, callsThrough:a, teamType:"followup" };
}

// Social Media team: flat ₦200/delivered, everything split equally among members
function calcSocialCommission(leadsContacted, leadsConfirmed, delivered, upsells=0, repeats=0, referrals=0, memberCount=1) {
  const a=Math.max(+leadsConfirmed||0,0), d=+delivered||0, mc=Math.max(memberCount,1);
  const rate=a>0?Math.round((d/a)*100):0;
  const base=d*200; // flat ₦200 regardless of rate
  const upsellBonus=(+upsells||0)*600; // always active
  const repeatBonus=(+repeats||0)*300;
  const referralBonus=(+referrals||0)*300;
  const totalPool=base+upsellBonus+repeatBonus+referralBonus;
  const perMember=Math.floor(totalPool/mc);
  return { rate, base, upsellBonus, repeatBonus, referralBonus, totalPool, perMember, memberCount:mc, leadsContacted:+leadsContacted||0, leadsConfirmed:a, upsellLocked:false, tier:"flat", teamType:"socialmedia" };
}

function filterByPeriod(items, field, period) {
  const now=new Date();
  return items.filter(item=>{
    const d=new Date(item[field]);
    if(period==="day") return d.toDateString()===now.toDateString();
    if(period==="week"){ const w=new Date(now); w.setDate(now.getDate()-7); return d>=w; }
    if(period==="month") return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==="year") return d.getFullYear()===now.getFullYear();
    return true;
  });
}
function filterLogsByPeriod(logs, period) {
  const now=new Date();
  return logs.filter(l=>{
    const d=new Date(l.date);
    if(period==="day") return l.date===todayStr();
    if(period==="week"){ const w=new Date(now); w.setDate(now.getDate()-7); return d>=w; }
    if(period==="month") return l.date?.slice(0,7)===now.toISOString().slice(0,7);
    if(period==="year") return l.date?.slice(0,4)===String(now.getFullYear());
    return true;
  });
}
function getWeeklyRate(logs, closerId) {
  const wl=filterLogsByPeriod(logs.filter(l=>l.closerId===closerId&&l.status==="approved"),"week");
  const a=wl.reduce((s,l)=>s+(+(l.callsThrough||l.assigned)||0),0);
  const d=wl.reduce((s,l)=>s+(+l.delivered||0),0);
  return a>0?Math.round((d/a)*100):null;
}

// ─── SCORE RING ───────────────────────────────────────────────────────────────
function ScoreRing({ score, size=100, stroke=9 }) {
  const r=(size-stroke*2)/2, circ=2*Math.PI*r, color=scoreColor(score);
  return (
    <div style={{ position:"relative",width:size,height:size,flexShrink:0 }}>
      <svg width={size} height={size} style={{ transform:"rotate(-90deg)",position:"absolute" }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={circ*(1-score/100)} strokeLinecap="round" style={{ transition:"stroke-dashoffset 1.2s ease" }}/>
      </svg>
      <div style={{ position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center" }}>
        <span style={{ fontSize:size*0.25,fontWeight:900,color:C.text,lineHeight:1 }}>{score}</span>
        <span style={{ fontSize:size*0.11,color:C.muted,marginTop:2 }}>/100</span>
      </div>
    </div>
  );
}

// ─── BACKEND SERVER ─────────────────────────────────────────────────────────────────────────────
const SERVER_URL = "https://salescoach-server.onrender.com";

async function transcribeAudio(audioFile) {
  const formData = new FormData();
  formData.append("audio", audioFile);
  const res = await fetch(`${SERVER_URL}/transcribe`, { method:"POST", body:formData });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error || `Transcription failed (${res.status})`);
  return data.transcript;
}

async function analyzeWithClaude({ transcript, closerName, callType, callOutcome, product, teamType }) {
  const res = await fetch(`${SERVER_URL}/analyze`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ transcript, closerName, callType, callOutcome, product, teamType }),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data?.error || `Analysis failed (${res.status})`);
  return data.analysis;
}

// ─── CALL UPLOAD ────────────────────────────────────────────────────────────────────────────────
function CallUploadSection({ user, teams, refresh }) {
  const [callType,setCallType]=useState("phone");
  const [callOutcome,setCallOutcome]=useState("unknown");
  const [product,setProduct]=useState("");
  const [audioFile,setAudioFile]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [status,setStatus]=useState("");
  const [progress,setProgress]=useState(0);
  const fileRef=useRef();
  const teamType=teams[user.teamId]?.type||"sales";

  const fileSizeMB = audioFile ? (audioFile.size/1024/1024).toFixed(1) : null;
  const fileOk = audioFile && audioFile.size < 25*1024*1024;

  const handleFile = e => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > 25*1024*1024) { setError(`File too large (${(f.size/1024/1024).toFixed(1)}MB). Max is 25MB. Please compress or trim the recording.`); return; }
    setAudioFile(f); setError("");
  };

  const submit = async () => {
    if (!audioFile) { setError("Please select an audio file."); return; }
    setError(""); setLoading(true); setProgress(5);
    try {
      setStatus("🎙️ Transcribing audio with Whisper AI..."); setProgress(10);
      const transcript = await transcribeAudio(audioFile);
      setProgress(45); setStatus("✅ Transcription done! Analyzing with Claude...");
      const steps=["🔍 Detecting language...","📊 Scoring performance...","✍️ Writing coaching report...","📚 Finding learning resources..."];
      let si=0; const sv=setInterval(()=>{ si=Math.min(si+1,steps.length-1); setStatus(steps[si]); setProgress(p=>Math.min(p+10,90)); },2200);
      const analysis = await analyzeWithClaude({transcript,closerName:user.name,callType,callOutcome,product,teamType});
      clearInterval(sv); setProgress(95);
      await addReport({ id:uid(), closerId:user.id, closerName:user.name, teamId:user.teamId, teamType, date:Date.now(), callType, callOutcome, product, audioFileName:audioFile.name, transcript, analysis });
      await refresh();
      setLoading(false); setProgress(0); setStatus("");
      setAudioFile(null); setProduct(""); setCallOutcome("unknown");
      if (fileRef.current) fileRef.current.value = "";
    } catch(e) {
      setLoading(false); setProgress(0); setStatus("");
      setError(e.message || "Something went wrong. Try again.");
    }
  };

  if (loading) return (
    <div style={{ ...S.card,textAlign:"center",padding:"44px 24px" }}>
      <style>{`@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}} @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}`}</style>

      <div style={{ fontSize:15,fontWeight:800,color:C.text,marginBottom:6 }}>{status}</div>
      <div style={{ fontSize:12,color:C.muted,marginBottom:20 }}>{progress<45?"Whisper is converting your audio to text...":"Claude is reading the transcript and building your report..."}</div>

        <div style={{ height:6,background:"rgba(255,255,255,0.06)",borderRadius:999,overflow:"hidden" }}>

        <div style={{ display:"flex",justifyContent:"space-between",marginTop:8,fontSize:10,color:C.muted }}>

        </div>
      </div>
      <div style={{ marginTop:16,fontSize:11,color:C.muted,animation:"pulse 2s ease infinite" }}>This takes 30–90 seconds for a 5–15 min call</div>
    </div>
  );

  return (
    <div style={S.card}>
      {error&&<div style={{ background:"rgba(255,107,107,0.08)",border:"1px solid rgba(255,107,107,0.2)",borderRadius:10,padding:"10px 13px",marginBottom:14,fontSize:12,color:"#FF8080",lineHeight:1.6 }}>⚠️ {error}</div>}
      <div style={{ ...S.g2,marginBottom:14 }}>
        <div><label style={S.label}>Call Type</label>
          <select style={S.select} value={callType} onChange={e=>setCallType(e.target.value)}>
            <option value="phone">📞 Phone Call</option>
            <option value="whatsapp">💬 WhatsApp Call</option>
          </select>
        </div>
        <div><label style={S.label}>Product Pitched</label>
          <input style={S.input} placeholder="e.g. Weight Loss Bundle" value={product} onChange={e=>setProduct(e.target.value)}/>
        </div>
        <div style={{ gridColumn:"span 2" }}><label style={S.label}>Call Outcome</label>
          <select style={S.select} value={callOutcome} onChange={e=>setCallOutcome(e.target.value)}>
            <option value="unknown">🤷 Unknown</option>
            <option value="confirmed">✅ Confirmed — Customer agreed to receive order</option>
            <option value="cancelled">❌ Cancelled — Customer declined</option>
            <option value="followup">🔄 Follow-up — Needs another call</option>
            <option value="callback">⏰ Call Back — Customer asked to call later</option>
          </select>
        </div>
      </div>
      <label style={S.label}>Call Recording</label>
      <div onClick={()=>fileRef.current?.click()} style={{ border:`2px dashed ${audioFile?C.green:"rgba(255,255,255,0.12)"}`,borderRadius:14,padding:"28px 20px",textAlign:"center",cursor:"pointer",background:audioFile?"rgba(0,229,160,0.04)":"rgba(255,255,255,0.02)",transition:"all 0.2s",marginBottom:14 }}>
        <input ref={fileRef} type="file" accept="audio/*,.mp3,.m4a,.wav,.ogg,.aac,.mp4" style={{ display:"none" }} onChange={handleFile}/>
        {audioFile ? (
          <div>
            <div style={{ fontSize:28,marginBottom:8 }}>🎵</div>
            <div style={{ fontSize:13,fontWeight:700,color:C.green,marginBottom:3 }}>{audioFile.name}</div>
            <div style={{ fontSize:11,color:C.muted,marginBottom:8 }}>{fileSizeMB}MB · {audioFile.type||"audio file"}</div>
            <div style={{ display:"flex",justifyContent:"center",gap:8 }}>
              <span style={S.pill(C.green)}>✅ Ready to transcribe</span>
              <span style={{ ...S.pill(C.muted),cursor:"pointer" }} onClick={e=>{e.stopPropagation();setAudioFile(null);if(fileRef.current)fileRef.current.value="";}}>✕ Remove</span>
            </div>
          </div>
        ) : (
          <div>
            <div style={{ fontSize:32,marginBottom:10 }}>🎙️</div>
            <div style={{ fontSize:13,fontWeight:700,color:C.text,marginBottom:4 }}>Tap to upload your call recording</div>
            <div style={{ fontSize:11,color:C.muted,lineHeight:1.7 }}>Supports MP3, M4A, WAV, AAC, OGG · Max 25MB<br/>Whisper AI will transcribe it automatically</div>

      </div>
      <button style={{ ...S.btn,opacity:(!audioFile||!fileOk)?0.45:1,width:"100%",padding:"13px",fontSize:14 }} onClick={submit} disabled={!audioFile||!fileOk}>

      </button>
    </div>
  );
}

// ─── MANAGEMENT DASHBOARD ─────────────────────────────────────────────────────
function ManagementDashboard({ user, users, teams, allReports, allLogs, allNoAnswers, onLogout, refresh, saveUsersData }) {
  const [tab,setTab]=useState("overview"); const [period,setPeriod]=useState("month");
  const [viewReport,setViewReport]=useState(null); const [msg,setMsg]=useState("");
  const [newName,setNewName]=useState(""); const [newPin,setNewPin]=useState(""); const [newRole,setNewRole]=useState("closer"); const [newTeam,setNewTeam]=useState("team1"); const [showAdd,setShowAdd]=useState(false); const [saving,setSaving]=useState(false);
  const flash=m=>{setMsg(m);setTimeout(()=>setMsg(""),3000);};
  const accentColor=accent(user.role); const teamList=Object.values(teams); const thisMonth=new Date().toISOString().slice(0,7);
  const closerList=Object.values(users).filter(u=>["closer","teamlead"].includes(u.role));
  const allStats=closerList.map(c=>{
    const reports=allReports.filter(r=>r.closerId===c.id);
    const logs=allLogs.filter(l=>l.closerId===c.id);
    const filtLogs=filterLogsByPeriod(logs.filter(l=>l.status==="approved"),period);
    const pAssigned=filtLogs.reduce((s,l)=>s+(+(l.callsThrough||l.leadsConfirmed||l.assigned)||0),0);
    const pDelivered=filtLogs.reduce((s,l)=>s+(+l.delivered||0),0);
    const periodRate=pAssigned>0?Math.round((pDelivered/pAssigned)*100):0;
    const avgScore=reports.length>0?Math.round(reports.reduce((s,r)=>s+(r.analysis?.overallScore||0),0)/reports.length):0;
    const weekRate=getWeeklyRate(allLogs,c.id);
    const team=teams[c.teamId]; const teamType=team?.type||"sales";
    // Earnings calculation differs for social media
    let periodEarnings=0;
    if(teamType==="socialmedia"){ periodEarnings=filtLogs.reduce((s,l)=>s+(l.commission?.perMember||0),0); }
    else { periodEarnings=filtLogs.reduce((s,l)=>s+(l.commission?.total||0),0); }
    return { ...c, reports, logs, avgScore, periodRate, periodEarnings, weekRate, team, teamType };
  }).sort((a,b)=>b.avgScore-a.avgScore);

  const poolQualifiers=allStats.filter(c=>c.teamType!=="socialmedia"&&(()=>{ const ml=c.logs.filter(l=>l.date?.startsWith(thisMonth)&&l.status==="approved"); const ma=ml.reduce((s,l)=>s+(+(l.callsThrough||l.assigned)||0),0); const md=ml.reduce((s,l)=>s+(+l.delivered||0),0); return ma>0&&(md/ma)>=0.9; })());
  const totalCommission=allLogs.filter(l=>l.status==="approved").reduce((s,l)=>s+(l.commission?.total||l.commission?.perMember||0),0);
  const filteredReports=filterByPeriod(allReports,"date",period);
  const redFlags=allStats.filter(c=>c.weekRate!==null&&c.weekRate<60);
  const teamStats=teamList.map(t=>{
    const members=Object.values(users).filter(u=>u.teamId===t.id);
    const tReports=filterByPeriod(allReports.filter(r=>r.teamId===t.id),"date",period);
    const tLogs=filterLogsByPeriod(allLogs.filter(l=>l.teamId===t.id&&l.status==="approved"),period);
    const avgScore=tReports.length>0?Math.round(tReports.reduce((s,r)=>s+(r.analysis?.overallScore||0),0)/tReports.length):0;
    const tEarnings=t.type==="socialmedia"?tLogs.reduce((s,l)=>s+(l.commission?.totalPool||0),0):tLogs.reduce((s,l)=>s+(l.commission?.total||0),0);
    return { ...t, members, tReports, tEarnings, avgScore };
  });
  const exportCSV=()=>{ const rows=[["Date","Closer","Team","Product","Type","Outcome","Score"]]; filteredReports.forEach(r=>{ const t=teams[r.teamId]; rows.push([fmtDate(r.date),r.closerName,t?.name||"",r.product||"",r.callType,r.callOutcome,r.analysis?.overallScore||""]); }); const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n"); const a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv); a.download="calls.csv"; a.click(); };
  const exportComm=()=>{ const rows=[["Date","Name","Team","Type","Assigned/Through","Delivered","Rate","Base","Upsell","Repeat","Referral","Total/PerMember","Status"]]; allLogs.forEach(l=>{ const t=teams[l.teamId]; const c=l.commission||{}; rows.push([l.date,l.closerName,t?.name||"",t?.type||"",l.callsThrough||l.leadsConfirmed||l.assigned,l.delivered,`${c.rate||0}%`,c.base||0,c.upsellBonus||0,c.repeatBonus||0,c.referralBonus||0,c.perMember||c.total||0,l.status]); }); const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n"); const a=document.createElement("a"); a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv); a.download="commission.csv"; a.click(); };
  const addUser=async()=>{ if(!newName.trim()||newPin.length!==4){flash("⚠️ Fill all fields."); return;} setSaving(true); const id=uid(); const updated={...users,[id]:{id,name:newName.trim(),pin:newPin,role:newRole,teamId:["closer","teamlead"].includes(newRole)?newTeam:null,createdAt:Date.now()}}; await saveUsersData(updated); await refresh(); setSaving(false); setNewName(""); setNewPin(""); setShowAdd(false); flash("✅ Account created!"); };
  const removeUser=async(id)=>{ if(id===user.id){flash("⚠️ Can't remove yourself."); return;} const u={...users}; delete u[id]; await saveUsersData(u); await refresh(); flash("🗑️ Removed."); };
  const nb=(id,lbl)=><button onClick={()=>setTab(id)} style={{ background:tab===id?`${accentColor}15`:"transparent",color:tab===id?accentColor:"#6A7A90",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,fontWeight:500,cursor:"pointer" }}>{lbl}</button>;

  return (
    <div style={{ minHeight:"100vh",background:C.bg,color:C.text,fontFamily:"'DM Sans','Segoe UI',sans-serif" }}>
      <div style={{ position:"fixed",inset:0,zIndex:0,pointerEvents:"none",backgroundImage:`linear-gradient(${accentColor}08 1px,transparent 1px),linear-gradient(90deg,${accentColor}08 1px,transparent 1px)`,backgroundSize:"44px 44px" }}/>
      <nav style={{ display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",height:56,background:"rgba(6,10,18,0.97)",borderBottom:`1px solid ${accentColor}20`,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(16px)" }}>
        <div style={{ display:"flex",alignItems:"center",gap:9 }}>
          <div style={{ width:30,height:30,borderRadius:8,background:`linear-gradient(135deg,${accentColor},${accentColor}88)`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:12,color:"#060A12" }}>SC</div>
          <div><div style={{ fontSize:13,fontWeight:800 }}>SalesCoach AI</div><div style={{ fontSize:9,color:accentColor,textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:600 }}>{ROLE_LABELS[user.role]}</div></div>
        </div>
        <div style={{ display:"flex",gap:2,flexWrap:"wrap" }}>
          {nb("overview","📊 Overview")}{nb("teams","🏢 Teams")}{nb("analyses","🧠 Analyses")}{nb("leaderboard","🏆 Leaderboard")}{nb("commission","💰 Commission")}{nb("reports","📋 Reports")}{nb("manage","⚙️ Manage")}
        </div>
        <div style={{ display:"flex",alignItems:"center",gap:10 }}>
          <div style={{ textAlign:"right" }}><div style={{ fontSize:12,fontWeight:700 }}>{user.name}</div><div style={{ fontSize:9,color:C.muted }}>{ROLE_LABELS[user.role]}</div></div>
          <button onClick={onLogout} style={{ background:"rgba(255,255,255,0.05)",border:`1px solid ${C.border}`,borderRadius:8,padding:"4px 10px",color:C.muted,cursor:"pointer",fontSize:11 }}>Sign Out</button>
        </div>
      </nav>
      <main style={{ maxWidth:1220,margin:"0 auto",padding:"28px 20px",position:"relative",zIndex:1 }}>
        {msg&&<div style={{ background:"rgba(0,229,160,0.1)",border:"1px solid rgba(0,229,160,0.2)",borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:13,color:C.green }}>{msg}</div>}

        {tab==="overview"&&(

            <div style={{ display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:16,flexWrap:"wrap",gap:10 }}>
              <div><h1 style={{ fontSize:22,fontWeight:900,marginBottom:4 }}>Company Overview</h1><p style={{ fontSize:13,color:C.muted }}>HealthPlus Nigeria · {teamList.length} teams · {closerList.length} closers & leads</p></div>
              <div style={{ display:"flex",gap:10 }}><button style={S.btnGhost} onClick={exportCSV}>📥 Calls CSV</button><button style={S.btnGhost} onClick={exportComm}>💰 Commission CSV</button></div>

                <div style={{ fontSize:12,fontWeight:800,color:C.red,marginBottom:7 }}>🚨 Weekly Red Flags — {redFlags.length} closer{redFlags.length>1?"s":""} below 60%</div>

function PinPad({ users, onSuccess }) {
  const [pin,setPin]=useState(""); const [sel,setSel]=useState(null); const [shake,setShake]=useState(false);
  const all=Object.values(users).sort((a,b)=>{ const o={ceo:0,gm:1,head_sales:2,head_creative:3,hr:4,teamlead:5,closer:6}; return (o[a.role]||9)-(o[b.role]||9); });
  const press=d=>{ if(pin.length>=4) return; const next=pin+d; setPin(next); if(next.length===4){ setTimeout(()=>{ const t=sel?(sel.pin===next?sel:null):all.find(u=>u.pin===next); if(t){onSuccess(t);setPin("");}else{setShake(true);setTimeout(()=>{setShake(false);setPin("");},600);} },120); } };
  return (
    <div style={{ minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans','Segoe UI',sans-serif" }}>
      <div style={{ position:"fixed",inset:0,backgroundImage:`linear-gradient(rgba(0,229,160,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.02) 1px,transparent 1px)`,backgroundSize:"44px 44px",pointerEvents:"none" }}/>
      <div style={{ position:"relative",zIndex:1,width:"100%",maxWidth:420,padding:"0 20px" }}>
        <div style={{ textAlign:"center",marginBottom:26 }}>
          <div style={{ width:52,height:52,borderRadius:14,background:`linear-gradient(135deg,${C.green},#00B37D)`,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:900,color:"#060A12",marginBottom:10 }}>SC</div>
          <div style={{ fontSize:20,fontWeight:900,color:C.text }}>SalesCoach AI</div>
          <div style={{ fontSize:10,color:C.green,textTransform:"uppercase",letterSpacing:"0.12em",fontWeight:600,marginTop:2 }}>HealthPlus Nigeria</div>
        </div>
        <div style={{ background:"rgba(255,255,255,0.03)",border:`1px solid ${C.border}`,borderRadius:20,padding:24 }}>
          <div style={{ fontSize:13,fontWeight:800,color:C.text,textAlign:"center",marginBottom:3 }}>Welcome Back</div>
          <div style={{ fontSize:11,color:C.muted,textAlign:"center",marginBottom:18 }}>Select your name · enter PIN</div>
          <div style={{ maxHeight:210,overflowY:"auto",marginBottom:18,display:"flex",flexDirection:"column",gap:4 }}>
            {all.map(u=>{ const a=accent(u.role); const t=SEED_TEAMS[u.teamId]; return (
              <div key={u.id} onClick={()=>{setSel(u);setPin("");}} style={{ display:"flex",alignItems:"center",gap:9,padding:"7px 11px",borderRadius:9,cursor:"pointer",border:`1px solid ${sel?.id===u.id?a:"rgba(255,255,255,0.06)"}`,background:sel?.id===u.id?`${a}10`:"rgba(255,255,255,0.02)",transition:"all 0.15s" }}>
                <div style={{ width:28,height:28,borderRadius:7,background:`${a}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:a,flexShrink:0 }}>{u.name.split(" ").map(w=>w[0]).join("").slice(0,2)}</div>
                <div style={{ flex:1 }}><div style={{ fontSize:12,fontWeight:600,color:C.text }}>{u.name}</div><div style={{ fontSize:10,color:C.muted }}>{ROLE_LABELS[u.role]}{t?` · ${teamTypeIcon(t.type)} ${t.name}`:""}</div></div>
                {sel?.id===u.id&&<div style={{ color:a,fontSize:13 }}>✓</div>}
              </div>
            );})}
          </div>
          <style>{`@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-5px)}50%{transform:translateX(5px)}}`}</style>
          <div style={{ display:"flex",justifyContent:"center",gap:11,marginBottom:20,animation:shake?"shake 0.5s ease":"none" }}>
            {[0,1,2,3].map(i=><div key={i} style={{ width:12,height:12,borderRadius:"50%",background:i<pin.length?C.green:"rgba(255,255,255,0.1)",transition:"background 0.15s" }}/>)}
          </div>
          <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8 }}>
            {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d,i)=>(
              <button key={i} onClick={()=>d==="⌫"?setPin(p=>p.slice(0,-1)):d!==""&&press(String(d))} disabled={d===""} style={{ height:48,borderRadius:11,border:"1px solid rgba(255,255,255,0.08)",background:d==="⌫"?"rgba(255,107,107,0.08)":"rgba(255,255,255,0.04)",color:d==="⌫"?C.red:C.text,fontSize:17,fontWeight:700,cursor:d===""?"default":"pointer",opacity:d===""?0:1,fontFamily:"inherit" }}>{d}</button>
            ))}
          </div>
          <div style={{ textAlign:"center",marginTop:12,fontSize:11,color:C.muted }}>{sel?`Enter PIN for ${sel.name.split(" ")[0]}`:"Select your name above"}</div>
        </div>
        <div style={{ textAlign:"center",marginTop:12,fontSize:10,color:"rgba(255,255,255,0.1)" }}>Mgmt: 0001–0005 · Leads: 1001–1005 · Closers: 2001–2008</div>
      </div>
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [ready,setReady]=useState(false);
  const [users,setUsers]=useState({});
  const [teams,setTeams]=useState({});
  const [reports,setReports]=useState([]);
  const [logs,setLogs]=useState([]);
  const [noAnswers,setNoAnswers]=useState([]);
  const [currentUser,setCurrentUser]=useState(null);
  const refresh=async()=>{ const [u,t,r,l,n]=await Promise.all([getUsers(),getTeams(),getReports(),getDailyLogs(),getNoAnswers()]); setUsers(u);setTeams(t);setReports(r);setLogs(l);setNoAnswers(n); };
  useEffect(()=>{ (async()=>{ await seedIfEmpty(); await refresh(); setReady(true); })(); },[]);
  if(!ready) return <div style={{ minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans','Segoe UI',sans-serif",color:C.text }}><div style={{ textAlign:"center" }}><div style={{ fontSize:34,marginBottom:10 }}>⚡</div><div style={{ fontSize:13,color:C.muted }}>Loading SalesCoach AI...</div></div></div>;
  if(!currentUser) return <PinPad users={users} onSuccess={u=>setCurrentUser(u)}/>;
  const props={ user:currentUser, users, teams, allReports:reports, allLogs:logs, allNoAnswers:noAnswers, onLogout:()=>setCurrentUser(null), refresh };
  const role=currentUser.role;
  if(role==="closer") return <CloserPortal {...props}/>;
  if(role==="teamlead") return <TeamLeadPortal {...props}/>;
  return <ManagementDashboard {...props} saveUsersData={async u=>{await saveUsers(u);setUsers(u);}}/>;
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
